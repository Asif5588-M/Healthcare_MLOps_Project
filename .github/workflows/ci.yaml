name: Healthcare Project Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Critical Verification Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn fastapi uvicorn pydantic requests

    - name: Verify Core Source Compilation Syntax
      run: |
        echo "Validating project syntax without full pipeline load..."
        python -m py_compile src/components/data_ingestion.py
        python -m py_compile src/components/data_transformation.py
        python -m py_compile src/components/model_trainer.py
        python -m py_compile src/pipeline/prediction_pipeline.py
        python -m py_compile app.py
