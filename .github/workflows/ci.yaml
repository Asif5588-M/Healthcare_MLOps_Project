name: Healthcare Project Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Project Requirement Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Code Syntax and Run Sanity Checks
      run: |
        echo "Validating core source compilation..."
        python -c "import src.components.data_ingestion; print('Data Ingestion Module Verified')"
        python -c "import src.components.data_transformation; print('Data Transformation Module Verified')"
        python -c "import src.components.model_trainer; print('Model Trainer Module Verified')"
